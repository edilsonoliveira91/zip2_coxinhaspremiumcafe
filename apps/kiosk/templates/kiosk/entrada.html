{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cardápio">
  <meta name="theme-color" content="#ea8828">
  <link rel="manifest" href="/kiosk/manifest.json">
  <link rel="apple-touch-icon" href="/static/img/logo/logo-coxinhaspremiumcafe.png">
  <title>Coxinhas Premium Café</title>
  {% tailwind_css %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js', {scope: '/kiosk/'}).catch(function(){});
    }
  </script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: linear-gradient(160deg, #1a0a00 0%, #3b1200 55%, #1a0a00 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Card central — layout horizontal */
    .card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 72px;
      width: 100%;
      max-width: 860px;
      padding: 0 48px;
    }

    /* Logo */
    .logo {
      width: 260px;
      height: auto;
      flex-shrink: 0;
      filter: brightness(0) invert(1) sepia(1) saturate(0.3) brightness(0.9);
      opacity: 0.95;
    }

    /* Divisor vertical */
    .divider {
      width: 1px;
      height: 180px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    /* Lado direito */
    .right {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      flex-shrink: 0;
    }

    .right-label {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Input da mesa */
    .mesa-input {
      width: 200px;
      height: 88px;
      background: rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      color: white;
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.18em;
      outline: none;
      caret-color: #ea8828;
      transition: border-color 0.2s, background 0.2s;
      /* Remover spinners do input number */
      -moz-appearance: textfield;
    }
    .mesa-input::-webkit-outer-spin-button,
    .mesa-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .mesa-input:focus {
      border-color: rgba(234,136,40,0.7);
      background: rgba(234,136,40,0.08);
    }
    .mesa-input::placeholder {
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.3em;
      font-weight: 300;
      font-size: 40px;
    }

    /* Botão */
    .btn-confirm {
      width: 200px;
      height: 64px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(to right, #ea8828, #d4600a);
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(234,136,40,0.45);
      transition: opacity 0.2s, transform 0.08s;
    }
    .btn-confirm:disabled {
      opacity: 0.2;
      box-shadow: none;
      cursor: default;
    }
    .btn-confirm:not(:disabled):active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <img src="{% static 'img/logo/logocompleto-coxinhaspremiumcafe.png' %}"
         alt="Coxinhas Premium Café"
         class="logo">

    <!-- Divisor -->
    <div class="divider"></div>

    <!-- Campo da mesa + botão -->
    <form method="post" id="form-entrada" class="right">
      {% csrf_token %}
      <p class="right-label">Número da mesa</p>
      <input
        type="number"
        name="numero"
        id="mesa-input"
        class="mesa-input"
        placeholder="__"
        min="1"
        max="99"
        maxlength="2"
        inputmode="numeric"
        pattern="[0-9]*"
        autofocus
        autocomplete="off"
      >
      <button type="submit" class="btn-confirm" id="btn-confirm" disabled>
        Abrir Mesa →
      </button>
    </form>

  </div>

  <script>
    const input = document.getElementById('mesa-input');
    const btn   = document.getElementById('btn-confirm');

    input.addEventListener('input', function () {
      // Limitar a 2 dígitos
      if (this.value.length > 2) this.value = this.value.slice(0, 2);
      btn.disabled = this.value.trim() === '' || parseInt(this.value) < 1;
    });

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !btn.disabled) {
        document.getElementById('form-entrada').submit();
      }
    });
  </script>

</body>
</html>
