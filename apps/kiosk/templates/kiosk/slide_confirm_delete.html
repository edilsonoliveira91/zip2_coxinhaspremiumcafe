{% extends 'base.html' %}
{% block title %}Remover Slide{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
  <h1 class="text-xl font-bold text-gray-900 mb-2">Remover Slide</h1>
  <p class="text-gray-600 mb-6">Tem certeza que deseja remover o slide <strong>{{ slide }}</strong>? Esta ação não pode ser desfeita.</p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit"
            class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-xl transition-colors">
      Sim, remover
    </button>
    <a href="{% url 'kiosk:slide_list' %}"
       class="flex-1 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition-colors">
      Cancelar
    </a>
  </form>
</div>
{% endblock %}
