<!-- Valor -->
<div style="margin-bottom:14px;">
    <label style="display:block;font-size:13px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">{{ label_valor }}</label>
    <div style="position:relative;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;font-weight:500;color:#8E8E93;pointer-events:none;">R$</span>
        <input type="number" name="valor" step="0.01" min="0.01" required placeholder="0,00"
               style="width:100%;box-sizing:border-box;min-height:44px;padding:0 14px 0 40px;border:1.5px solid #D1D1D6;border-radius:12px;font-size:15px;font-family:inherit;color:#1D1D1F;outline:none;"
               onfocus="this.style.borderColor='#007AFF';this.style.boxShadow='0 0 0 3px rgba(0,122,255,0.12)'"
               onblur="this.style.borderColor='#D1D1D6';this.style.boxShadow='none'">
    </div>
</div>
<!-- Descrição -->
<div style="margin-bottom:14px;">
    <label style="display:block;font-size:13px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">Descrição <span style="font-size:11px;font-weight:400;color:#8E8E93;">opcional</span></label>
    <input type="text" name="descricao" placeholder="{{ placeholder_desc }}"
           style="width:100%;box-sizing:border-box;min-height:44px;padding:0 14px;border:1.5px solid #D1D1D6;border-radius:12px;font-size:15px;font-family:inherit;color:#1D1D1F;outline:none;"
           onfocus="this.style.borderColor='#007AFF';this.style.boxShadow='0 0 0 3px rgba(0,122,255,0.12)'"
           onblur="this.style.borderColor='#D1D1D6';this.style.boxShadow='none'">
</div>
<!-- Observação -->
<div>
    <label style="display:block;font-size:13px;font-weight:600;color:#1D1D1F;margin-bottom:6px;">Observação <span style="font-size:11px;font-weight:400;color:#8E8E93;">opcional</span></label>
    <textarea name="observacao" rows="2" placeholder="Notas adicionais..."
              style="width:100%;box-sizing:border-box;padding:10px 14px;border:1.5px solid #D1D1D6;border-radius:12px;font-size:14px;font-family:inherit;color:#1D1D1F;outline:none;resize:none;"
              onfocus="this.style.borderColor='#007AFF';this.style.boxShadow='0 0 0 3px rgba(0,122,255,0.12)'"
              onblur="this.style.borderColor='#D1D1D6';this.style.boxShadow='none'"></textarea>
</div>
