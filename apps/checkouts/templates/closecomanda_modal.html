<style>
[x-cloak]{display:none !important}
.no-spin::-webkit-inner-spin-button,.no-spin::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.no-spin{-moz-appearance:textfield}
</style>

<script>
function abrirModalFinalizar(){window.dispatchEvent(new CustomEvent('open-payment-modal'))}
</script>

<!-- MODAL CHECKOUT V2 -->
<div id="modal-checkout-v2"
     x-data="checkoutV2()"
     x-show="open"
     x-cloak
     @keydown.escape.window="fechar()"
     class="fixed inset-0 z-50 flex items-center justify-center p-6"
     style="background:rgba(15,23,42,.55);backdrop-filter:blur(4px)">

  <div class="bg-white rounded-2xl w-full max-w-md shadow-xl border border-gray-200 relative overflow-hidden"
       x-show="open"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       @click.stop>

    <!-- LOADING OVERLAY -->
    <div x-show="loading" class="absolute inset-0 bg-white/90 z-50 flex items-center justify-center">
      <div class="w-8 h-8 border-[3px] border-gray-200 border-t-gray-800 rounded-full animate-spin"></div>
    </div>

    <!-- TOPO ESCURO -->
    <div class="bg-gray-800 text-white px-5 py-4">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-gray-400 text-[11px] font-semibold uppercase tracking-wider">Fechar Comanda</p>
          <p class="text-lg font-bold mt-0.5">#{{ comanda.numero }}</p>
        </div>
        <button @click="fechar()" class="text-gray-400 hover:text-white p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="mt-3 flex items-baseline gap-1">
        <span class="text-gray-400 text-sm font-medium">R$</span>
        <span class="text-3xl font-black" x-text="fmt(total)"></span>
      </div>
    </div>

    <!-- STEP 1 - METODOS (4 botões em linha) -->
    <div x-show="step===1" class="p-5">
      <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">Forma de pagamento</p>
      <div class="flex gap-2">
        <button @click="escolher('dinheiro')" class="flex-1 py-3 rounded-lg border border-gray-200 hover:border-green-500 hover:bg-green-50 transition text-center group">
          <svg class="w-5 h-5 mx-auto text-gray-400 group-hover:text-green-600 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span class="text-xs font-bold text-gray-600 group-hover:text-green-700">Din.</span>
        </button>
        <button @click="escolher('pix')" class="flex-1 py-3 rounded-lg border border-gray-200 hover:border-teal-500 hover:bg-teal-50 transition text-center group">
          <svg class="w-5 h-5 mx-auto text-gray-400 group-hover:text-teal-600 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1"/></svg>
          <span class="text-xs font-bold text-gray-600 group-hover:text-teal-700">Pix</span>
        </button>
        <button @click="escolher('cartao_credito')" class="flex-1 py-3 rounded-lg border border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition text-center group">
          <svg class="w-5 h-5 mx-auto text-gray-400 group-hover:text-blue-600 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
          <span class="text-xs font-bold text-gray-600 group-hover:text-blue-700">Créd.</span>
        </button>
        <button @click="escolher('cartao_debito')" class="flex-1 py-3 rounded-lg border border-gray-200 hover:border-purple-500 hover:bg-purple-50 transition text-center group">
          <svg class="w-5 h-5 mx-auto text-gray-400 group-hover:text-purple-600 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
          <span class="text-xs font-bold text-gray-600 group-hover:text-purple-700">Déb.</span>
        </button>
      </div>
    </div>

    <!-- STEP 2 - DINHEIRO -->
    <div x-show="step===2 && metodo==='dinheiro'" class="p-5">
      <div class="flex items-center justify-between mb-4">
        <button @click="voltar()" class="text-xs text-gray-500 hover:text-gray-800 flex items-center gap-1 font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Voltar
        </button>
        <span class="text-[11px] font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded border border-green-200 uppercase">Dinheiro</span>
      </div>

      <label class="text-xs font-semibold text-gray-500 mb-1 block">Valor Recebido</label>
      <input type="number" x-model="recebido" @input="calcTroco()" min="0" step="0.01" placeholder="0.00"
             :class="invalido ? 'border-red-400 bg-red-50 text-red-700' : 'border-gray-300 focus:border-gray-800 bg-white text-gray-900'"
             class="no-spin w-full px-3 py-2 text-xl font-black border-2 rounded-lg focus:outline-none mb-1">
      <p x-show="invalido" class="text-[11px] text-red-500 font-semibold mb-2">
        Faltam R$ <span x-text="fmt(total-(parseFloat(recebido)||0))"></span>
      </p>

      <div class="flex gap-1.5 my-3">
        <template x-for="v in atalhos()" :key="v">
          <button @click="recebido=v;calcTroco()"
                  :class="parseFloat(recebido)===v ? 'bg-gray-800 text-white border-gray-800' : 'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'"
                  class="flex-1 py-1.5 text-xs font-bold rounded border transition"
                  x-text="'R$ '+fmt(v)"></button>
        </template>
      </div>

      <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 mb-4">
        <span class="text-[11px] font-bold text-gray-500 uppercase">Troco</span>
        <span :class="troco>0?'text-green-600':'text-gray-300'" class="text-xl font-black"
              x-text="troco!==null&&!invalido ? 'R$ '+fmt(Math.max(troco,0)) : 'R$ 0,00'"></span>
      </div>

      <button @click="pagar()" :disabled="invalido||!recebido"
              :class="(invalido||!recebido) ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-800 hover:bg-gray-900 text-white'"
              class="w-full py-2.5 rounded-lg font-bold text-sm transition uppercase">
        Confirmar
      </button>
    </div>

    <!-- STEP 2 - CARTAO / PIX -->
    <div x-show="step===2 && metodo!=='dinheiro'" class="p-5 text-center">
      <div class="flex items-center justify-between mb-4">
        <button @click="voltar()" class="text-xs text-gray-500 hover:text-gray-800 flex items-center gap-1 font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Voltar
        </button>
        <span class="text-[11px] font-bold text-gray-700 bg-gray-100 px-2 py-0.5 rounded border border-gray-200 uppercase" x-text="metodo?metodo.replace('_',' '):''"></span>
      </div>

      <svg class="w-10 h-10 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      <p class="text-sm font-semibold text-gray-700 mb-1">Confirme a cobrança</p>
      <p class="text-xs text-gray-400 mb-5">Valor: <strong class="text-gray-700" x-text="'R$ '+fmt(total)"></strong></p>

      <button @click="pagar()"
              class="w-full py-2.5 bg-gray-800 hover:bg-gray-900 text-white rounded-lg font-bold text-sm transition uppercase">
        Confirmar no Sistema
      </button>
    </div>

    <!-- STEP 3 - SUCESSO -->
    <div x-show="step===3" class="p-8 text-center">
      <div class="w-14 h-14 rounded-full bg-green-100 border-[3px] border-green-500 flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h3 class="text-xl font-black text-gray-800 mb-0.5">Comanda Fechada!</h3>
      <p class="text-xs text-gray-400 font-semibold mb-4">Redirecionando...</p>
      <template x-if="metodo==='dinheiro' && troco>0">
        <div class="bg-gray-50 border border-gray-200 rounded-lg px-4 py-3">
          <span class="block text-[11px] text-gray-500 font-bold uppercase mb-0.5">Troco ao Cliente</span>
          <span class="block text-2xl font-black text-green-600" x-text="'R$ '+fmt(troco)"></span>
        </div>
      </template>
    </div>

  </div>
</div>

<script>
function checkoutV2(){
  return {
    open:false,
    step:1,
    metodo:null,
    recebido:'',
    troco:null,
    loading:false,
    total:parseFloat('{{ comanda.total_amount|default:"0.00"|stringformat:"f" }}'),

    get invalido(){
      if(!this.recebido) return false;
      return parseFloat(this.recebido)<this.total;
    },

    abrir(){this.step=1;this.metodo=null;this.recebido='';this.troco=null;this.loading=false;this.open=true},
    fechar(){if(this.step===3||this.loading) return;this.open=false},

    escolher(m){
      this.metodo=m;this.recebido='';this.troco=null;this.step=2;
      if(m==='dinheiro') this.$nextTick(()=>{const i=this.$el.querySelector('input[type=number]');if(i)i.focus()});
    },
    voltar(){this.step=1;this.metodo=null;this.recebido='';this.troco=null},

    calcTroco(){const v=parseFloat(this.recebido);this.troco=isNaN(v)?null:v-this.total},

    atalhos(){
      const t=this.total;
      const b=[Math.ceil(t),Math.ceil(t/5)*5,Math.ceil(t/10)*10,Math.ceil(t/20)*20,Math.ceil(t/50)*50,Math.ceil(t/100)*100];
      return[...new Set(b.filter(v=>v>=t))].slice(0,4)
    },

    fmt(v){return parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})},

    pagar(){
      if(this.metodo==='dinheiro'&&this.invalido) return;
      this.loading=true;
      const o={payment_method:this.metodo};
      if(this.metodo==='dinheiro'){o.received_amount=parseFloat(this.recebido);o.change_amount=this.troco}

      fetch("{% url 'checkouts:finalize' comanda.numero %}",{
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token }}'},
        body:JSON.stringify(o)
      })
      .then(r=>r.json())
      .then(d=>{
        this.loading=false;
        if(d.success){this.step=3;setTimeout(()=>{window.location.href="{% url 'accounts:dashboard' %}"},3000)}
        else{alert('Erro: '+d.message)}
      })
      .catch(()=>{this.loading=false;alert('Erro de conexão.')});
    },

    init(){window.addEventListener('open-payment-modal',()=>this.abrir())}
  }
}
</script>
